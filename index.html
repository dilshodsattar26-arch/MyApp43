<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Marketing and conversion">
    <title>Landing Page - MyApp43</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            
            color: #333;
            line-height: 1.6;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 0;
            box-shadow: none;
            flex: 1;
        }
        header {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 10px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .tagline { font-size: 1.2em; opacity: 0.95; }
        .badge {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            margin: 5px;
            font-size: 0.9em;
            font-weight: 600;
        }
        .features {
            margin: 30px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #f093fb;
            transition: transform 0.3s;
        }
        .feature:hover { transform: translateY(-5px); }
        .feature strong { color: #f093fb; display: block; margin-bottom: 8px; }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .stat {
            text-align: center;
            padding: 15px;
            min-width: 120px;
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #f093fb; }
        .stat-label { color: #636e72; font-size: 0.9em; }
        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #636e72;
            border-top: 2px solid #f0f0f0;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Landing Page</h1>
            <p class="tagline">Marketing and conversion</p>
        </header>
        
        <div>
            <span class="badge">v1.4.3</span>
            <span class="badge">ID: ZKP2UJ5S</span>
            <span class="badge">Build: 6623</span>
        </div>
        
        <div class="features">
            <div class="feature"><strong>✓</strong> Drag & Drop</div><div class="feature"><strong>✓</strong> Auto-save</div><div class="feature"><strong>✓</strong> Collaboration Tools</div><div class="feature"><strong>✓</strong> Version Control</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value">440+</div>
                <div class="stat-label">Users</div>
            </div>
            <div class="stat">
                <div class="stat-value">660</div>
                <div class="stat-label">Downloads</div>
            </div>
            <div class="stat">
                <div class="stat-value">352</div>
                <div class="stat-label">Stars</div>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2026 MyApp43. All rights reserved.</p>
            <p style="margin-top: 10px; font-size: 0.85em;">Built with ❤️ by dilshodsattar26-arch</p>
            <p style="margin-top: 5px; font-size: 0.8em; color: #b2bec3;">#ZKP2UJ5S</p>
        </footer>
    </div>
</body>
</html>
